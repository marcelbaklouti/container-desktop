name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '27 3 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

# Scoped to JavaScript/TypeScript (the landing page). Swift analysis is intentionally
# omitted: CodeQL's Swift extractor cannot reliably build this app in CI on the
# bleeding-edge Xcode 26.6 / macOS 26 toolchain (which additionally requires the Metal
# Toolchain for SwiftTerm), so it produced a "configuration error" on every run. The
# Swift app is still compiled by ci.yml's `app` job. Re-add a `swift` analysis here once
# GitHub's CodeQL Swift support stabilizes on this toolchain.
jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:javascript-typescript
